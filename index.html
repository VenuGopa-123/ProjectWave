<!DOCTYPE html>
<html>

<head>

<title>Project Wave</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}

.box{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
}

button{
padding:12px 20px;
margin-top:20px;
cursor:pointer;
}

.item{
margin-top:20px;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

img{
max-width:300px;
border-radius:10px;
}

video{
max-width:500px;
}

audio{
width:100%;
}

a{
display:block;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h1>Let's Start!</h1>

<input
type="file"
id="files"
multiple>

<br>

<button onclick="upload()">
Here!
</button>

<div id="status"></div>

<div id="links"></div>

</div>

<script>

const URL="PASTE_YOUR_PROJECT_URL";
const KEY="PASTE_YOUR_ANON_KEY";

async function upload(){

let files=
document
.getElementById("files")
.files;

if(files.length===0){

alert("Select file");

return;

}

for(let f of files){

try{

let path=
Date.now()
+
"_"
+
f.name;

let response=
await fetch(

URL+

"/storage/v1/object/uploads/"

+

encodeURIComponent(path),

{

method:"POST",

headers:{

apikey:KEY,

Authorization:
"Bearer "+KEY,

"x-upsert":"true",

"Content-Type":
f.type

},

body:f

}

);

if(!response.ok){

let err=
await response.text();

alert(
"Upload failed\n"
+
err
);

continue;

}

let publicUrl=

URL+

"/storage/v1/object/public/uploads/"

+

encodeURIComponent(path);

let ext=
f.name
.split(".")
.pop()
.toLowerCase();

let html=
"<div>";

html+=
"<h3>"+f.name+"</h3>";

if(
["mp3","wav","ogg"]
.includes(ext)
){

html+=
`
<audio controls>
<source src="${publicUrl}">
</audio>
`;

}

else if(
["mp4","webm"]
.includes(ext)
){

html+=
`
<video width="400" controls>
<source src="${publicUrl}">
</video>
`;

}

else if(
["jpg","jpeg","png","webp"]
.includes(ext)
){

html+=
`
<img
src="${publicUrl}"
width="300">
`;

}

else{

html+=
`
<a
href="${publicUrl}"
target="_blank">

Open File

</a>
`;

}

html+="</div>";

document
.getElementById(
"links"
)

.innerHTML

+=

html;

}

catch(e){

alert(
"Error: "
+
e.message
);

}

}

}

</script>

</body>

</html>
