```html
<!DOCTYPE html>
<html>

<head>

<title>Project Wave</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}

.box{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
}

button{
padding:12px 20px;
margin-top:20px;
cursor:pointer;
}

.item{
margin-top:20px;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

img{
max-width:300px;
border-radius:10px;
}

video{
max-width:500px;
}

audio{
width:100%;
}

a{
display:block;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h1>Let's Start!</h1>

<input
type="file"
id="files"
multiple>

<br>

<button onclick="upload()">
Here!
</button>

<div id="status"></div>

<div id="links"></div>

</div>

<script>

const URL=
"https://stcyjxvxmsrddbbpksqw.supabase.co";

const KEY=
"sb_publishable_Ess0L13-6qNB0C4qwUMPDg_AokMv0M2";

async function upload(){

let files=
document
.getElementById(
"files"
)
.files;

if(files.length===0){

alert(
"Select files first"
);

return;

}

for(let f of files){

try{

document
.getElementById(
"status"
)
.innerHTML=
"Uploading...";

let path=
Date.now()
+
"_"
+
f.name;

await fetch(

URL+

"/storage/v1/object/uploads/"

+

path,

{

method:"POST",

headers:{

apikey:KEY,

Authorization:
"Bearer "+KEY

},

body:f

}

);

let publicUrl=

URL+

"/storage/v1/object/public/uploads/"

+

path;

let ext=
f.name
.split(".")
.pop()
.toLowerCase();

let html=
'<div class="item">';

html+=
"<h3>"
+
f.name
+
"</h3>";

if(
["jpg","jpeg","png","gif","webp"]
.includes(ext)
){

html+=
`
<img src="${publicUrl}">
`;

}

else if(
["mp3","wav","ogg"]
.includes(ext)
){

html+=
`
<audio controls>
<source src="${publicUrl}">
</audio>
`;

}

else if(
["mp4","webm"]
.includes(ext)
){

html+=
`
<video controls>
<source src="${publicUrl}">
</video>
`;

}

else if(
ext==="pdf"
){

html+=
`
<iframe
src="${publicUrl}"
width="100%"
height="500">
</iframe>
`;

}

else{

html+=
`
<a
href="${publicUrl}"
target="_blank">

Open File

</a>
`;

}

html+=
`
<br>

<a
href="${publicUrl}"
target="_blank">

Open Directly

</a>

</div>
`;

document
.getElementById(
"links"
)

.innerHTML

+=

html;

document
.getElementById(
"status"
)

.innerHTML=

"Upload Complete";

}

catch(e){

document
.getElementById(
"status"
)

.innerHTML=

"Upload Failed";

}

}

}

</script>

</body>

</html>
